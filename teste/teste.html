<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Exemplo Sankhya BI com Data</title>
</head>
<body>
  <h2>Filtro de Data no Sankhya BI</h2>

  <!-- Campo de data que recebe o parâmetro vindo do BI -->
  <label for="dataEvento">Data do Evento:</label>
  <input type="date" id="dataEvento" value="{{pData}}">

  <br><br>

  <!-- Botão para enviar a data escolhida de volta ao BI -->
  <button onclick="enviarParaSQL()">Enviar Data para SQL</button>

  <p id="resultado"></p>

  <script>
    // Recebe o parâmetro do BI (binding)
    let dataParametro = "{{pData}}";
    document.getElementById("dataEvento").value = dataParametro;

    // Função para atualizar o parâmetro no BI
    function enviarParaSQL() {
      let dataSelecionada = document.getElementById("dataEvento").value;
      // Atualiza o parâmetro no Sankhya BI
      $scope.setParam("pData", dataSelecionada);

      // Mostra na tela para conferência
      document.getElementById("resultado").innerText = "Data enviada: " + dataSelecionada;
    }
  </script>
</body>
</html>
